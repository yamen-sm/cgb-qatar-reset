<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Your Password</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #131316;
    --surface-hover: #1a1a1f;
    --border: #2a2a30;
    --border-focus: #4f6ef7;
    --accent: #4f6ef7;
    --accent-glow: rgba(79, 110, 247, 0.25);
    --text: #e8e8ec;
    --text-muted: #7a7a85;
    --success: #34d399;
    --success-bg: rgba(52, 211, 153, 0.1);
    --error: #f87171;
    --error-bg: rgba(248, 113, 113, 0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79, 110, 247, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79, 110, 247, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(79, 110, 247, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .icon-wrap {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: rgba(79, 110, 247, 0.1);
    border: 1px solid rgba(79, 110, 247, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }

  .icon-wrap svg {
    width: 22px;
    height: 22px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-family: 'Space Mono', monospace;
  }

  .input-wrap {
    position: relative;
  }

  input[type="password"], input[type="text"] {
    width: 100%;
    padding: 12px 44px 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .toggle-vis {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 4px;
    display: flex;
    transition: color 0.2s;
  }

  .toggle-vis:hover { color: var(--text); }

  .toggle-vis svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Strength meter */
  .strength-bar {
    display: flex;
    gap: 4px;
    margin-top: 10px;
  }

  .strength-bar .seg {
    height: 3px;
    flex: 1;
    border-radius: 2px;
    background: var(--border);
    transition: background 0.3s;
  }

  .strength-bar.s1 .seg:nth-child(1) { background: var(--error); }
  .strength-bar.s2 .seg:nth-child(-n+2) { background: #fbbf24; }
  .strength-bar.s3 .seg:nth-child(-n+3) { background: #34d399; }
  .strength-bar.s4 .seg { background: var(--accent); }

  .strength-label {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--text-muted);
    margin-top: 6px;
    min-height: 16px;
  }

  .match-error {
    font-size: 12px;
    color: var(--error);
    margin-top: 6px;
    min-height: 18px;
  }

  button.submit {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.2s, box-shadow 0.2s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  button.submit:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  button.submit:active:not(:disabled) { transform: translateY(0); }

  button.submit:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Status messages */
  .msg {
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 20px;
    display: none;
  }

  .msg.error {
    background: var(--error-bg);
    border: 1px solid rgba(248, 113, 113, 0.2);
    color: var(--error);
    display: block;
  }

  .msg.success {
    background: var(--success-bg);
    border: 1px solid rgba(52, 211, 153, 0.2);
    color: var(--success);
    display: block;
  }

  /* Success state */
  .success-state {
    text-align: center;
    display: none;
  }

  .success-state .check-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(52, 211, 153, 0.1);
    border: 2px solid rgba(52, 211, 153, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .success-state .check-circle svg {
    width: 28px;
    height: 28px;
    stroke: var(--success);
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .success-state h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .success-state p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .wa-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
    padding: 12px 24px;
    background: #25D366;
    color: #fff;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.2s;
  }

  .wa-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
  }

  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
  }

  /* Fade in */
  .card { animation: fadeUp 0.5s ease-out; }
  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(16px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <!-- Form state -->
    <div id="formState">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>

      <h1>Reset Password</h1>
      <p class="subtitle">Enter your new password below. The link expires in 15 minutes.</p>

      <div id="msgBox" class="msg"></div>

      <div class="field">
        <label>New Password</label>
        <div class="input-wrap">
          <input type="password" id="newPass" placeholder="Enter new password" autocomplete="new-password">
          <button class="toggle-vis" type="button" onclick="toggleVis('newPass', this)">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-bar" id="strengthBar"><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="confirmPass" placeholder="Confirm new password" autocomplete="new-password">
          <button class="toggle-vis" type="button" onclick="toggleVis('confirmPass', this)">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="match-error" id="matchError"></div>
      </div>

      <button class="submit" id="submitBtn" disabled onclick="handleSubmit()">Reset Password</button>
    </div>

    <!-- Success state -->
    <div class="success-state" id="successState">
      <div class="check-circle">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Password Updated</h2>
      <p>Your password has been reset successfully. Tap below to go back and log in.</p>
      <a href="https://wa.me/5511935031656" class="wa-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 0 0 .612.616l4.584-1.476A11.955 11.955 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.359 0-4.548-.816-6.275-2.18l-.438-.357-2.857.92.94-2.787-.373-.457A9.94 9.94 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
        Back to WhatsApp
      </a>
    </div>
  </div>

  <div class="footer">Secured with end-to-end encryption</div>
</div>

<script>
  // ============================================================
  // CONFIG — Update these with your actual Supabase credentials
  // ============================================================
  const SUPABASE_URL = 'https://ipicfrhuepyjclvyrykd.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_maNTtGx_nu8Ch1aZSVNV-A_fQvvY4gJ';

  // Extract token from URL
  const params = new URLSearchParams(window.location.search);
  const TOKEN = params.get('token');

  // If no token, show error immediately
  if (!TOKEN) {
    showMsg('Invalid or missing reset link. Please request a new one from WhatsApp.', 'error');
    document.getElementById('submitBtn').style.display = 'none';
  }

  // Password visibility toggle
  function toggleVis(inputId, btn) {
    const input = document.getElementById(inputId);
    const isPass = input.type === 'password';
    input.type = isPass ? 'text' : 'password';
    btn.innerHTML = isPass
      ? '<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
      : '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  }

  // Password strength
  function getStrength(pw) {
    let score = 0;
    if (pw.length >= 8) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/\d/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    return score;
  }

  const labels = ['', 'Weak', 'Fair', 'Strong', 'Excellent'];
  const newPass = document.getElementById('newPass');
  const confirmPass = document.getElementById('confirmPass');
  const bar = document.getElementById('strengthBar');
  const sLabel = document.getElementById('strengthLabel');
  const matchErr = document.getElementById('matchError');
  const submitBtn = document.getElementById('submitBtn');

  function validate() {
    const pw = newPass.value;
    const cpw = confirmPass.value;
    const s = getStrength(pw);

    bar.className = 'strength-bar' + (pw.length > 0 ? ' s' + s : '');
    sLabel.textContent = pw.length > 0 ? labels[s] : '';

    if (cpw.length > 0 && pw !== cpw) {
      matchErr.textContent = 'Passwords do not match';
    } else {
      matchErr.textContent = '';
    }

    submitBtn.disabled = !(pw.length >= 8 && s >= 2 && pw === cpw && TOKEN);
  }

  newPass.addEventListener('input', validate);
  confirmPass.addEventListener('input', validate);

  function showMsg(text, type) {
    const box = document.getElementById('msgBox');
    box.textContent = text;
    box.className = 'msg ' + type;
  }

  async function handleSubmit() {
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span>';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/reset_password`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          p_token: TOKEN,
          p_new_password: newPass.value
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.message || 'Something went wrong. Please try again.');
      }

      if (data.success === false) {
        throw new Error(data.error || 'Invalid or expired token. Request a new link from WhatsApp.');
      }

      // Show success
      document.getElementById('formState').style.display = 'none';
      document.getElementById('successState').style.display = 'block';

    } catch (err) {
      showMsg(err.message, 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Reset Password';
    }
  }
</script>

</body>
</html>
